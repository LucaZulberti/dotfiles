##### Terminal and input ######################################################

# Use a modern terminfo entry and enable true color for common terminals.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Make escape-based key sequences feel immediate.
set -s escape-time 0


##### Prefix and core session controls ########################################

# Replace the default prefix (C-b) with Ctrl-Space.
unbind C-b
set -g prefix C-Space
bind -N "Send tmux prefix to application" C-Space send-prefix

# Reload tmux configuration.
bind -N "Reload tmux config" r source-file ~/.config/tmux/tmux.conf

# Kill the current session.
bind -N "Kill current session" C-Q kill-session

# Kill the tmux server.
bind -N "Kill tmux server" Q kill-server


##### General behavior #########################################################

# Start window numbering at 1 instead of 0.
set -g base-index 1

# Keep numbering compact after closing windows.
set -g renumber-windows on

# Keep mouse handling disabled.
set -g mouse off

# Use vi-style keys in copy mode.
set -wg mode-keys vi


##### Copy mode ###############################################################

# In copy-mode-vi:
#   v -> begin selection
#   y -> copy selection to the first available clipboard tool and exit copy mode
bind -T copy-mode-vi -N "Begin selection" v send-keys -X begin-selection
bind -T copy-mode-vi -N "Copy selection to clipboard" y \
  send-keys -X copy-pipe-and-cancel 'if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; else cat >/dev/null; fi'


##### Window navigation ########################################################

# Jump to the previously active window.
bind -r -N "Go to last active window" C-a last-window

# Navigate windows without prefix.
bind -n -N "Previous window" M-H previous-window
bind -n -N "Next window" M-L next-window


##### Session switching with sesh #############################################

# Switch to the previous sesh-managed session.
bind -N "Switch to last sesh session" BSpace run-shell "sesh last"

# Open the sesh session picker.
bind -N "Open sesh session picker" S display-popup -E -w 80% -h 70% -d "#{pane_current_path}" -T "Sesh" tv sesh


##### Pane management ##########################################################

# Split panes in the current pane's working directory.
unbind %
bind -N "Split pane horizontally" "|" split-window -h -c "#{pane_current_path}"

unbind '"'
bind -N "Split pane vertically" "-" split-window -v -c "#{pane_current_path}"

# Resize panes in fixed steps.
bind -r -N "Resize pane left"  H resize-pane -L 5
bind -r -N "Resize pane right" L resize-pane -R 5
bind -r -N "Resize pane up"    K resize-pane -U 5
bind -r -N "Resize pane down"  J resize-pane -D 5

# Confirm pane kill, defaulting to yes.
bind -N "Kill current pane" x confirm-before -y -p "Kill pane #P (y/n)? [y]" kill-pane

# Respawn the current pane even if it is still alive.
bind -r -N "Respawn current pane" R respawn-pane -k


##### Utilities ################################################################

# Open TODO.md from the current directory, falling back to the global todo file.
bind -r -N "Open TODO file" D new-window -c "#{pane_current_path}" \
  "if test -e TODO.md; and nvim TODO.md; else; nvim ~/.config/todo.md; end"

# Open the tmux sessionizer helper.
bind -r -N "Open tmux sessionizer" f new-window -c "#{pane_current_path}" "~/.config/tmuxp/tmuxp-sessionizer"


##### Tmux Plugin Manager ######################################################

# Plugins managed by TPM.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'olimorris/tmux-pomodoro-plus'
set -g @plugin 'arl/gitmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux'


##### Plugin: vim-tmux-navigator ##############################################

# Use Ctrl-h/j/k/l to move between Vim and tmux panes.
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev "C-\\"


##### Plugin: tmux-pomodoro-plus ##############################################

# Key bindings handled by the plugin itself.
set -g @pomodoro_toggle 't'
set -g @pomodoro_cancel 'T'
set -g @pomodoro_skip 'M-t'
set -g @pomodoro_restart 'M-r'

# Behavior.
set -g @pomodoro_sound "on"
set -g @pomodoro_notifications "on"
set -g @pomodoro_granularity "on"
set -g @pomodoro_intervals "8"
set -g @pomodoro_repeat "no"

# Symbols and prompts.
set -g @pomodoro_on " "
set -g @pomodoro_complete " "
set -g @pomodoro_pause " "
set -g @pomodoro_prompt_break " ? prefix-p to confirm"
set -g @pomodoro_prompt_pomodoro " ? prefix-p to confirm"
set -g @pomodoro_interval_display " %s/%s"


##### Plugin: catppuccin/tmux #################################################

# Theme flavor: latte, frappe, macchiato, or mocha.
set -g @catppuccin_flavor "mocha"

# Window appearance.
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Status modules.
set -g @catppuccin_status_module_bg_color "#{@thm_crust}"

run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# Status line layout.
set -g status-left-length 100
set -g status-right-length 100

set -g status-left ""

set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_pomodoro_plus}"
set -ag status-right "#{E:@catppuccin_status_gitmux}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Refresh the status line every second.
set -g status-interval 1


##### Initialize TPM ##########################################################

run '~/.config/tmux/plugins/tpm/tpm'
